<svg width="1024" height="1024" viewBox="0 0 120 120" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Fluly app icon — Plum listening on water</title>
  <rect width="120" height="120" rx="26" fill="#6D28D9"/>
  <!-- Plum body -->
  <ellipse cx="60" cy="54" rx="34" ry="33" fill="#7C3AED"/>
  <ellipse cx="60" cy="50" rx="32" ry="30" fill="#8B5CF6"/>
  <!-- shine -->
  <ellipse cx="50" cy="36" rx="14" ry="9" fill="#A78BFA" opacity="0.45" transform="rotate(-20 50 36)"/>
  <!-- left eye -->
  <circle cx="48" cy="50" r="10" fill="white"/>
  <circle cx="49.5" cy="51.5" r="6" fill="#1a0533"/>
  <circle cx="46.5" cy="48.5" r="2.2" fill="white"/>
  <!-- right eye -->
  <circle cx="72" cy="50" r="10" fill="white"/>
  <circle cx="73.5" cy="51.5" r="6" fill="#1a0533"/>
  <circle cx="70.5" cy="48.5" r="2.2" fill="white"/>
  <!-- cheeks -->
  <ellipse cx="38" cy="61" rx="6" ry="3.5" fill="#F9A8D4" opacity="0.55"/>
  <ellipse cx="82" cy="61" rx="6" ry="3.5" fill="#F9A8D4" opacity="0.55"/>
  <!-- smile -->
  <path d="M 50 67 Q 60 76 70 67" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- sound waves LEFT -->
  <path d="M 18 46 Q 14 54 18 62" stroke="#C4B5FD" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <path d="M 11 41 Q 5 54 11 67" stroke="#C4B5FD" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- sound waves RIGHT -->
  <path d="M 102 46 Q 106 54 102 62" stroke="#C4B5FD" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <path d="M 109 41 Q 115 54 109 67" stroke="#C4B5FD" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- water reflection -->
  <ellipse cx="60" cy="89" rx="28" ry="4.5" fill="#5B21B6" opacity="0.35"/>
  <!-- water waves -->
  <path d="M 20 95 Q 30 89 40 95 Q 50 101 60 95 Q 70 89 80 95 Q 90 101 100 95" stroke="#A78BFA" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 28 103 Q 38 97 48 103 Q 58 109 68 103 Q 78 97 90 103" stroke="#A78BFA" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.4"/>
</svg>